<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RSX RESET KEY - RISZY XZIAM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        /* --- ธีมสี Cyberpunk Gaming 2026 ถอดแบบจากเว็บหลัก --- */
        :root {
            --primary-red: #ff003c;
            --neon-blue: #00e5ff;
            --dark-bg: #050203;
            --panel-bg: #0f0708;
            --border-color: rgba(255, 0, 60, 0.25);
            --text-gray: #a6a6a6;
            --success-green: #00ff66;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Mitr', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #260309 0%, var(--dark-bg) 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 15px;
        }

        .reset-box {
            background: var(--panel-bg);
            border: 2px solid var(--primary-red);
            border-radius: 24px;
            padding: 35px 25px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 35px rgba(255, 0, 60, 0.25);
            animation: boxFadeUp 0.5s ease-in-out;
        }

        @keyframes boxFadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .header-section h2 {
            font-size: 1.8rem;
            color: #fff;
            letter-spacing: 2px;
        }

        .header-section h2 span {
            color: var(--primary-red);
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
        }

        .header-section p {
            color: var(--text-gray);
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 0.88rem;
            color: var(--text-gray);
        }

        .form-input {
            width: 100%;
            padding: 14px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #000;
            color: #fff;
            font-size: 1.05rem;
            outline: none;
            text-align: center;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .form-input:focus {
            border-color: var(--primary-red);
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.25);
        }

        .info-display-panel {
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed var(--border-color);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .info-row:last-child { border-bottom: none; }
        .info-lbl { color: var(--text-gray); }
        .info-val { font-weight: 500; }
        .info-val.highlight { color: var(--neon-blue); font-family: monospace; }
        .info-val.device-text { word-break: break-all; max-width: 200px; text-align: right; font-family: monospace; font-size: 0.8rem; }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
            margin-bottom: 12px;
        }

        .btn-red { background: var(--primary-red); color: white; }
        .btn-red:hover { background: #ff2154; box-shadow: 0 0 15px rgba(255,0,60,0.4); }
        .btn-grey { background: #1a0b0d; color: #ffb3b7; border: 1px solid rgba(255,0,60,0.15); text-decoration: none; }
        .btn-grey:hover { background: #2b1114; }
    </style>
</head>
<body>

    <div class="reset-box">
        <div class="header-section">
            <h2>RSX <span>รีเซ็ทคีย์</span></h2>
            <p>ระบบเคลียร์อุปกรณ์ ย้ายเครื่องใช้งานสำหรับลูกค้า VIP</p>
        </div>

        <div id="search-container">
            <div class="input-group">
                <label><i class="fa-solid fa-key" style="color: var(--primary-red);"></i> รหัสคีย์ไลเซนส์ของคุณ:</label>
                <input type="text" id="customerKeyInput" class="form-input" placeholder="วางรหัสคีย์ของคุณที่นี่...">
            </div>
            <button class="btn btn-red" onclick="checkCustomerKeyData()">
                <i class="fa-solid fa-magnifying-glass"></i> ตรวจสอบสิทธิ์คีย์ในคลาวด์
            </button>
        </div>

        <div id="result-container" style="display: none;">
            <div class="info-display-panel" id="infoPanel" style="display: block;">
                <div class="info-row">
                    <span class="info-lbl">รหัสคีย์:</span>
                    <span class="info-val highlight" id="display-key-id">-</span>
                </div>
                <div class="info-row">
                    <span class="info-lbl">เวลาคงเหลือระบบ:</span>
                    <span class="info-val" id="display-expiry-status">-</span>
                </div>
                <div class="info-row">
                    <span class="info-lbl">บอร์ดเครื่องที่ล็อกอยู่:</span>
                    <span class="info-val device-text" id="display-device-id">-</span>
                </div>
            </div>
            
            <button class="btn btn-red" onclick="processDeviceReset()">
                <i class="fa-solid fa-rotate"></i> ยืนยันปลดล็อกย้ายเครื่องใหม่
            </button>
        </div>

        <a href="index.html" class="btn btn-grey">
            <i class="fa-solid fa-house"></i> เสร็จสิ้นและกลับหน้าแรก
        </a>
    </div>

    <script>
        // --- ดึงคอนฟิกสากลเชื่อมตรงจากหลังบ้านตัวจริงของคุณ ---
        const firebaseConfig = {
            apiKey: "AIzaSyDdVwtGix3Vspr0VVqW5-M5PL6IQZ-9guk",
            authDomain: "kuku-bd6bd.firebaseapp.com",
            projectId: "kuku-bd6bd",
            storageBucket: "kuku-bd6bd.firebasestorage.app",
            messagingSenderId: "20260309266",
            appId: "1:20260309266:web:95cff78d1d9bc402344bcb",
            measurementId: "G-1YNH71SD69"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentActiveKey = "";

        // --- ระบบเช็คประวัติคีย์ก่อนรีเซ็ต ---
        function checkCustomerKeyData() {
            const inputKey = document.getElementById('customerKeyInput').value.trim();
            
            if(!inputKey) {
                Swal.fire({ icon: 'warning', title: 'ระบุข้อมูล', text: 'กรุณากรอกหรือวางรหัสคีย์พรีเมียมของคุณก่อนครับ', confirmButtonColor: '#ff003c' });
                return;
            }

            Swal.fire({ title: 'กำลังสแกนฐานข้อมูลคลาวด์...', didOpen: () => { Swal.showLoading(); } });

            db.collection("keys").doc(inputKey).get().then(doc => {
                Swal.close();
                if (doc.exists) {
                    const data = doc.data();
                    currentActiveKey = doc.id;

                    document.getElementById('display-key-id').innerText = doc.id;
                    
                    if (data.status === 'used' && data.expiresAt > 0) {
                        const diffTime = data.expiresAt - new Date().getTime();
                        if (diffTime <= 0) {
                            document.getElementById('display-expiry-status').innerHTML = '<span style="color:#ff3333; font-weight:bold;">หมดอายุการใช้งาน</span>';
                        } else {
                            const daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                            document.getElementById('display-expiry-status').innerHTML = `<span style="color:var(--success-green); font-weight:bold;">เหลือเวลา ${daysLeft} วัน</span>`;
                        }
                    } else {
                        document.getElementById('display-expiry-status').innerText = `${data.days} วัน (คีย์ใหม่ยังไม่เริ่มนับเวลา)`;
                    }

                    document.getElementById('display-device-id').innerHTML = data.deviceId ? `<i class="fa-solid fa-mobile-screen" style="color:var(--neon-blue);"></i> ${data.deviceId}` : '<span style="color:rgba(255,255,255,0.25);">บอร์ดว่าง (ยังไม่มีการผูกเครื่อง)</span>';

                    document.getElementById('search-container').style.display = 'none';
                    document.getElementById('result-container').style.display = 'block';

                } else {
                    Swal.fire({ icon: 'error', title: 'ไม่พบรหัสคีย์', text: 'ไม่พบข้อมูลคีย์พรีเมียมนี้ในระบบหลัก กรุณาตรวจสอบอีกครั้งครับ', confirmButtonColor: '#ff003c' });
                }
            }).catch(err => {
                Swal.close();
                Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ฐานข้อมูลในขณะนี้ได้', confirmButtonColor: '#ff003c' });
            });
        }

        // --- แกนหลักแก้ไขบั๊ก: ลบฟิลด์แบบถอนรากถอนโคน + ปรับสถานะกลับเป็น unused ---
        function processDeviceReset() {
            if(!currentActiveKey) return;

            Swal.fire({
                title: 'ยืนยันการย้ายเครื่อง?',
                text: "ระบบจะทำการล้างประวัติเครื่องเดิมออกจากฐานข้อมูลคลาวด์ เพื่อให้คุณนำไปเข้าใช้งานที่เครื่องใหม่ได้ทันที",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#ff003c',
                cancelButtonColor: '#1a0b0d',
                confirmButtonText: 'ยืนยันปลดล็อกเครื่อง',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'กำลังตัดการเชื่อมต่ออุปกรณ์...', didOpen: () => { Swal.showLoading(); } });

                    // ใช้ FieldValue.delete() เพื่อลบฟิลด์ deviceId ทิ้งไปเลย และเปลี่ยนสถานะกลับเป็น unused เพื่อให้ Loader เครื่องใหม่ยอมรับ
                    db.collection("keys").doc(currentActiveKey).update({
                        deviceId: firebase.firestore.FieldValue.delete(),
                        status: "unused"
                    }).then(() => {
                        Swal.close();
                        Swal.fire({
                            icon: 'success',
                            title: 'ปลดล็อกบอร์ดสำเร็จ!',
                            text: 'รีเซ็ตข้อมูลอุปกรณ์เสร็จสิ้น สามารถเปิดแอปที่เครื่องใหม่เพื่อล็อกอินเข้าใช้งานได้ทันทีครับ!',
                            confirmButtonColor: '#ff003c'
                        }).then(() => {
                            // รีเซ็ตหน้าจอกลับสู่โหมดค้นหาเริ่มต้นอย่างนุ่มนวล
                            document.getElementById('customerKeyInput').value = "";
                            document.getElementById('search-container').style.display = 'block';
                            document.getElementById('result-container').style.display = 'none';
                            currentActiveKey = "";
                        });
                    }).catch(error => {
                        Swal.close();
                        Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถส่งคำสั่งเคลียร์ข้อมูลไปยังระบบ Cloud ได้', confirmButtonColor: '#ff003c' });
                    });
                }
            });
        }
    </script>
</body>
</html>
